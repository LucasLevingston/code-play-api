services:
  - type: web
    name: code-play-api
    runtime: node
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3333
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: NODEMAILER_PASS
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_ROOT_USERNAME
        sync: false
      - key: DB_ROOT_PASSWORD
        sync: false
      - key: HOST
        value: 0.0.0.0
